<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aristotle · Card Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f4f4f4;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: #0a0a0a;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      color: #888884;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 3rem;
      align-items: start;
    }

    /* FORM */
    .form-panel {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .field {
      display: grid;
      grid-template-columns: 120px 1fr;
      align-items: center;
      gap: 0.5rem;
    }

    .field label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888884;
    }

    .field input, .field select {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      padding: 0.4rem 0.6rem;
      border: 1px solid #c8c8c0;
      background: #fff;
      color: #0a0a0a;
      outline: none;
      width: 100%;
    }

    .field input:focus { border-color: #0a0a0a; }

    .divider {
      border: none;
      border-top: 1px solid #c8c8c0;
      margin: 0.6rem 0;
    }

    .session-row {
      display: grid;
      grid-template-columns: 120px 1fr 1fr;
      gap: 0.5rem;
      align-items: center;
    }

    .session-row label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888884;
    }

    .btn {
      margin-top: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: #0a0a0a;
      color: #fff;
      border: none;
      padding: 0.8rem 1.4rem;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }

    .btn-secondary {
      background: transparent;
      color: #0a0a0a;
      border: 1px solid #0a0a0a;
      margin-top: 0.4rem;
    }

    /* PREVIEW */
    .preview-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .preview-label {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #888884;
    }

    #card-wrapper {
      background: #fff;
      border: 1px solid #c8c8c0;
      display: inline-block;
    }

    svg#card { display: block; }

    .hint {
      font-size: 0.65rem;
      color: #888884;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<h1>Aristotle · Card Generator</h1>

<div class="layout">

  <!-- FORM -->
  <div class="form-panel">

    <div class="session-row">
      <label>Session</label>
      <select id="session">
        <option value="MORNING">Morning</option>
        <option value="EVENING">Evening</option>
      </select>
      <input id="date" type="text" value="02 May 2026" placeholder="02 May 2026"/>
    </div>

    <hr class="divider"/>

    <div class="field">
      <label>SUI Price</label>
      <input id="sui-price" type="text" value="$0.92"/>
    </div>
    <div class="field">
      <label>SUI Chg</label>
      <input id="sui-chg" type="text" value="+1.4% △"/>
    </div>

    <hr class="divider"/>

    <div class="field">
      <label>TVL</label>
      <input id="tvl" type="text" value="$545.8M"/>
    </div>
    <div class="field">
      <label>TVL Chg</label>
      <input id="tvl-chg" type="text" value="+0.8% △"/>
    </div>

    <hr class="divider"/>

    <div class="field">
      <label>Stablecoin</label>
      <input id="stable" type="text" value="$560.5M"/>
    </div>
    <div class="field">
      <label>Stable Chg</label>
      <input id="stable-chg" type="text" value="+1.0% △"/>
    </div>

    <hr class="divider"/>

    <div class="field">
      <label>DEX Vol</label>
      <input id="dex" type="text" value="$31.3M"/>
    </div>
    <div class="field">
      <label>DEX Chg</label>
      <input id="dex-chg" type="text" value="-6.1% ▼"/>
    </div>

    <hr class="divider"/>

    <div class="field">
      <label>DeepBook</label>
      <input id="deep" type="text" value="$5.7M"/>
    </div>
    <div class="field">
      <label>Deep Chg</label>
      <input id="deep-chg" type="text" value="-17.5% ▼"/>
    </div>

    <hr class="divider"/>

    <div class="field">
      <label>Mean Rev</label>
      <input id="mean" type="text" value="-0.72σ"/>
    </div>
    <div class="field">
      <label>Mean Chg</label>
      <input id="mean-chg" type="text" value="+0.43 △"/>
    </div>

    <hr class="divider"/>

    <div class="field">
      <label>Logos Index</label>
      <input id="logos" type="text" value="40.3"/>
    </div>
    <div class="field">
      <label>Index Chg</label>
      <input id="logos-chg" type="text" value="+1.0 △"/>
    </div>

    <button class="btn" onclick="updateCard()">Generate Card</button>
    <button class="btn btn-secondary" onclick="downloadSVG()">Download SVG</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div class="preview-label">Preview — screenshot this</div>
    <div id="card-wrapper">
      <svg id="card" width="680" height="300" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="680" height="300" fill="#f4f4f4"/>
        <rect x="40" y="20" width="600" height="260" fill="#ffffff" stroke="#c8c8c0" stroke-width="0.5"/>

        <!-- HEADER -->
        <text id="c-header" x="68" y="52" font-family="IBM Plex Mono, monospace" font-size="11" letter-spacing="0.14em" fill="#0a0a0a">ARISTOTLE · SUI · 02 MAY 2026 · 07:00 UTC · MORNING</text>
        <line x1="40" y1="64" x2="640" y2="64" stroke="#c8c8c0" stroke-width="0.5"/>

        <!-- SUI -->
        <text x="68" y="92" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a" letter-spacing="0.1em">SUI</text>
        <text id="c-sui-price" x="220" y="92" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="500" fill="#0a0a0a">$0.92</text>
        <text id="c-sui-chg" x="360" y="92" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a">+1.4% △</text>

        <!-- TVL -->
        <text x="68" y="116" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a" letter-spacing="0.1em">TVL</text>
        <text id="c-tvl" x="220" y="116" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="500" fill="#0a0a0a">$545.8M</text>
        <text id="c-tvl-chg" x="360" y="116" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a">+0.8% △</text>

        <!-- STABLECOIN -->
        <text x="68" y="140" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a" letter-spacing="0.1em">STABLECOIN</text>
        <text id="c-stable" x="220" y="140" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="500" fill="#0a0a0a">$560.5M</text>
        <text id="c-stable-chg" x="360" y="140" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a">+1.0% △</text>

        <!-- DEX VOL -->
        <text x="68" y="164" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a" letter-spacing="0.1em">DEX VOL</text>
        <text id="c-dex" x="220" y="164" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="500" fill="#0a0a0a">$31.3M</text>
        <text id="c-dex-chg" x="360" y="164" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a">-6.1% ▼</text>

        <!-- DEEPBOOK -->
        <text x="68" y="188" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a" letter-spacing="0.1em">DEEPBOOK</text>
        <text id="c-deep" x="220" y="188" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="500" fill="#0a0a0a">$5.7M</text>
        <text id="c-deep-chg" x="360" y="188" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a">-17.5% ▼</text>

        <!-- MEAN REV -->
        <text x="68" y="212" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a" letter-spacing="0.1em">MEAN REV</text>
        <text id="c-mean" x="220" y="212" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="500" fill="#0a0a0a">-0.72σ</text>
        <text id="c-mean-chg" x="360" y="212" font-family="IBM Plex Mono, monospace" font-size="12" fill="#0a0a0a">+0.43 △</text>

        <line x1="40" y1="224" x2="640" y2="224" stroke="#c8c8c0" stroke-width="0.5"/>

        <!-- LOGOS INDEX -->
        <text x="68" y="254" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="500" fill="#0a0a0a" letter-spacing="0.1em">LOGOS INDEX</text>
        <text id="c-logos" x="360" y="254" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="500" fill="#0a0a0a">40.3 /100 (+1.0 △)</text>

        <line x1="40" y1="264" x2="640" y2="264" stroke="#c8c8c0" stroke-width="0.5"/>
        <text x="68" y="278" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c8c8c0" letter-spacing="0.08em">aristotle.report · t.me/aristotlesuiupdate</text>
      </svg>
    </div>
    <p class="hint">Tip: right-click the card → Save image as, or take a screenshot.</p>
  </div>

</div>

<script>
  function val(id) {
    return document.getElementById(id).value.trim();
  }

  function setText(id, text) {
    document.getElementById(id).textContent = text;
  }

  function updateCard() {
    var session = val('session');
    var date = val('date').toUpperCase();
    var time = session === 'MORNING' ? '07:00' : '19:00';
    setText('c-header', 'ARISTOTLE · SUI · ' + date + ' · ' + time + ' UTC · ' + session);

    setText('c-sui-price', val('sui-price'));
    setText('c-sui-chg',   val('sui-chg'));
    setText('c-tvl',       val('tvl'));
    setText('c-tvl-chg',   val('tvl-chg'));
    setText('c-stable',    val('stable'));
    setText('c-stable-chg',val('stable-chg'));
    setText('c-dex',       val('dex'));
    setText('c-dex-chg',   val('dex-chg'));
    setText('c-deep',      val('deep'));
    setText('c-deep-chg',  val('deep-chg'));
    setText('c-mean',      val('mean'));
    setText('c-mean-chg',  val('mean-chg'));

    var logos = val('logos');
    var logosChg = val('logos-chg');
    setText('c-logos', logos + ' /100 (' + logosChg + ')');
  }

  function downloadSVG() {
    updateCard();
    var svg = document.getElementById('card');
    var serializer = new XMLSerializer();
    var svgStr = serializer.serializeToString(svg);
    var blob = new Blob([svgStr], {type: 'image/svg+xml'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'aristotle-card.svg';
    a.click();
    URL.revokeObjectURL(url);
  }
</script>

</body>
</html>
